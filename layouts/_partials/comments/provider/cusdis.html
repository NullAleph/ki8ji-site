<style>
.comments-section {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.comments-heading {
    font-family: 'IBM Plex Serif', Georgia, serif !important;
    font-size: 2.4rem !important;
    font-weight: 400 !important;
    color: rgba(255, 255, 255, 0.9) !important;
    margin-bottom: 1.5rem !important;
}

#cusdis_thread {
    width: 100% !important;
}

#cusdis_thread iframe {
    width: 100% !important;
    height: 600px;
    border: none !important;
    overflow: hidden !important;
    display: block !important;
}
    
    style.textContent = `
    body, html {
        background: #303030 !important;
        color: rgba(255, 255, 255, 0.8) !important;
    }
    input, textarea {
        background: #424242 !important;
        color: rgba(255, 255, 255, 0.8) !important;
        border-color: rgba(255, 255, 255, 0.2) !important;
    }
    label, p, span {
        color: rgba(255, 255, 255, 0.7) !important;
    }
    a {
        color: rgba(255, 255, 255, 0.4) !important;
    }
    button {
        background: #FF9933 !important;
        color: #ffffff !important;
        border: none !important;
    }
    ::placeholder {
        color: rgba(255, 255, 255, 0.3) !important;
    }
    .text-center {
        display: none !important;
    }
    `;    
</style>

<div class="comments-section">
    <h3 class="comments-heading">Leave a Comment</h3>
    <div id="cusdis_thread"
        data-host="https://cusdis.com"
        data-app-id="{{ .Site.Params.comments.cusdis.id }}"
        data-page-id="{{ .RelPermalink }}"
        data-page-url="{{ .Permalink }}"
        data-page-title="{{ .Title }}"
    ></div>
    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
</div>

<script>
// Inject custom CSS into Cusdis iframe
const observer = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
        mutation.addedNodes.forEach((node) => {
            if (node.tagName === 'IFRAME') {
                node.setAttribute('scrolling', 'no');
                node.addEventListener('load', () => {
                    try {
                        const iframeDoc = node.contentDocument || node.contentWindow.document;
                        const style = iframeDoc.createElement('style');
                        style.textContent = `
                            body, html {
                                background: #303030 !important;
                                color: rgba(255, 255, 255, 0.8) !important;
                            }
                            input, textarea {
                                background: #424242 !important;
                                color: rgba(255, 255, 255, 0.8) !important;
                                border-color: rgba(255, 255, 255, 0.2) !important;
                            }
                            label, p, span, a {
                                color: rgba(255, 255, 255, 0.7) !important;
                            }
                            button {
                                background: #FF9933 !important;
                                color: #ffffff !important;
                                border: none !important;
                            }
                            ::placeholder {
                                color: rgba(255, 255, 255, 0.3) !important;
                            }
                            .text-center {
                                    display: none !important;
                            }
                        `;
                        iframeDoc.head.appendChild(style);
                    } catch(e) {
                        // Cross-origin iframe - injection blocked
                        console.log('Cusdis iframe style injection blocked:', e);
                    }
                });
            }
        });
    });
});

observer.observe(document.getElementById('cusdis_thread'), {
    childList: true,
    subtree: true
});

// Auto-resize
// Auto-resize Cusdis iframe by polling its scrollHeight
function startCusdisResize() {
    const thread = document.getElementById('cusdis_thread');
    if (!thread) return;
    
    const iframeObserver = new MutationObserver(() => {
        const iframe = thread.querySelector('iframe');
        if (!iframe) return;
        
        iframeObserver.disconnect();
        
        let lastHeight = 0;
        
        // Fast poll on initial load, then slow continuous poll
        // to catch dynamic content like reply forms
        function measureHeight() {
            try {
                const h = iframe.contentWindow.document.body.scrollHeight;
                if (h !== lastHeight) {
                    lastHeight = h;
                    iframe.style.height = (h + 20) + 'px';
                }
            } catch(e) {
                // Cross-origin — do nothing
            }
        }
        
        // Fast polling for first 3 seconds (initial load)
        const fastPoll = setInterval(measureHeight, 100);
        setTimeout(() => {
            clearInterval(fastPoll);
            // Then slow continuous polling forever (catches reply forms, etc.)
            setInterval(measureHeight, 500);
        }, 3000);
    });
    
    iframeObserver.observe(thread, { childList: true, subtree: true });
}

startCusdisResize();
</script>
